<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>JobCopilot</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="header">
    <div><h1>JobCopilot</h1><p>先筛选和审核，再自动投递</p></div>
    <span class="safe-badge">人工批准制</span>
  </header>

  <section class="card">
    <button class="card-h" type="button" data-toggle="cfgBody"><span>① 基础配置</span><span>▾</span></button>
    <div class="card-b" id="cfgBody">
      <label>AI 服务商</label>
      <select id="llmProvider">
        <option value="xiaomi">Xiaomi MiMo</option>
        <option value="deepseek">DeepSeek</option>
        <option value="longcat">LongCat</option>
        <option value="custom">自定义 OpenAI 兼容接口</option>
      </select>
      <label>API Key</label>
      <input type="password" id="llmApiKey" placeholder="在服务商控制台创建" autocomplete="off">
      <label>API 地址</label>
      <input type="text" id="llmBaseUrl" placeholder="https://api.example.com/v1">
      <label>模型名称</label>
      <input type="text" id="llmModel" placeholder="如：LongCat-2.0">
      <div id="llmAuthRow" class="hidden">
        <label>鉴权方式</label>
        <select id="llmAuthType">
          <option value="bearer">Authorization: Bearer</option>
          <option value="api-key">api-key 请求头</option>
        </select>
      </div>
      <div class="inline-actions">
        <button type="button" class="btn-secondary" id="testLlm">测试连接</button>
        <span id="llmTestStatus" class="test-status" aria-live="polite"></span>
      </div>

      <label>简历文字（用于筛选和生成开场）</label>
      <textarea id="resumeText" rows="6" placeholder="粘贴技能、项目、工作经历和教育背景"></textarea>
      <label>当前筛选方案</label>
      <div class="plan-picker">
        <select id="searchProfileSelect"></select>
        <button class="icon-btn" id="newSearchProfile" type="button">复制新建</button>
        <button class="icon-btn danger" id="deleteSearchProfile" type="button">删除</button>
      </div>
      <label>方案名称</label>
      <input type="text" id="searchProfileName" placeholder="深圳 AI 产品｜100 人以上">
      <div id="filterConditionSummary" class="condition-summary" aria-live="polite"></div>
      <label>岗位关键词（支持逗号、顿号或换行分隔）</label>
      <textarea id="keyword" rows="2" placeholder="AI 产品经理、AI Agent 产品经理"></textarea>
      <div class="grid-two">
        <div><label>搜索匹配模式</label><select id="searchMatchMode">
          <option value="precise">精准</option>
          <option value="balanced" selected>平衡</option>
          <option value="loose">宽松</option>
        </select></div>
        <div><label>城市</label><input type="text" id="city" placeholder="深圳"></div>
      </div>
      <label class="toggle-label"><input type="checkbox" id="keywordExpansionEnabled" checked> 自动扩展 AI 产品相关关键词</label>
      <div id="keywordSearchSummary" class="search-summary" aria-live="polite"></div>
      <label>唯一岗位收集上限</label>
      <input type="number" id="count" value="10" min="1" max="200">

      <div class="filter-group">
        <label class="toggle-label"><input type="checkbox" id="experienceFilterEnabled" checked> 启用工作经验筛选</label>
        <div class="filter-options" id="experienceFilterOptions"></div>
      </div>
      <div class="filter-group">
        <label class="toggle-label"><input type="checkbox" id="companySizeFilterEnabled" checked> 启用公司规模筛选</label>
        <div class="filter-options" id="companySizeFilterOptions"></div>
      </div>
      <details class="filter-group advanced-filters">
        <summary>更多硬筛选条件</summary>
        <p class="filter-help">条件明确不符合会在调用 AI 前排除；启用但页面信息缺失时进入“待补充”。</p>
        <div class="filter-subgroup">
          <label class="toggle-label"><input type="checkbox" id="employmentTypeFilterEnabled"> 启用岗位类型筛选</label>
          <div class="filter-options" id="employmentTypeFilterOptions"></div>
        </div>
        <div class="filter-subgroup">
          <label class="toggle-label"><input type="checkbox" id="educationFilterEnabled"> 启用学历要求筛选</label>
          <div class="filter-options" id="educationFilterOptions"></div>
        </div>
        <div class="filter-subgroup">
          <label class="toggle-label"><input type="checkbox" id="salaryFilterEnabled"> 启用月薪范围筛选</label>
          <div class="grid-two filter-fields" id="salaryFilterFields">
            <div><label>最低月薪（K）</label><input type="number" id="salaryMinK" min="0" step="1" value="15"></div>
            <div><label>最高月薪（K）</label><input type="number" id="salaryMaxK" min="0" step="1" value="30"></div>
          </div>
        </div>
        <div class="filter-subgroup">
          <label class="toggle-label"><input type="checkbox" id="districtFilterEnabled"> 启用行政区筛选</label>
          <div id="districtFilterFields"><label>行政区（逗号、顿号或换行分隔）</label>
            <input type="text" id="districtValues" placeholder="南山区、福田区"></div>
        </div>
        <div class="filter-subgroup">
          <label class="toggle-label"><input type="checkbox" id="publishedTimeFilterEnabled"> 启用发布时间筛选</label>
          <div id="publishedTimeFilterFields"><label>发布时间</label><select id="publishedWithinDays">
            <option value="0">当天</option><option value="3">3 天内</option>
            <option value="7" selected>7 天内</option><option value="30">30 天内</option>
          </select></div>
        </div>
        <div class="filter-subgroup">
          <label class="toggle-label"><input type="checkbox" id="mustWordsFilterEnabled"> 启用必须包含词</label>
          <div id="mustWordsFilterFields"><label>关键词</label><textarea id="mustWords" rows="2" placeholder="Agent、RAG"></textarea>
            <label>命中方式</label><select id="mustWordsMode"><option value="any">任意一个</option><option value="all">全部命中</option></select></div>
        </div>
        <div class="filter-subgroup">
          <label class="toggle-label"><input type="checkbox" id="excludeWordsFilterEnabled"> 启用排除关键词</label>
          <div id="excludeWordsFilterFields"><label>关键词</label><textarea id="excludeWords" rows="2" placeholder="销售、外包"></textarea>
            <label>匹配范围</label><select id="excludeWordsScope"><option value="title">仅岗位标题</option><option value="title_jd">岗位标题与完整 JD</option></select></div>
        </div>
        <div class="filter-subgroup">
          <label class="toggle-label"><input type="checkbox" id="companyBlacklistEnabled"> 启用公司黑名单</label>
          <div id="companyBlacklistFields"><label>公司名称（精确匹配，每行一家）</label>
            <textarea id="companyBlacklist" rows="3" placeholder="示例科技有限公司"></textarea></div>
        </div>
      </details>
      <button class="btn-primary" id="saveCfg">保存基础配置</button>
      <span id="saved" class="ok-msg hidden">✓ 已保存</span>
    </div>
  </section>

  <section class="card">
    <button class="card-h" type="button" data-toggle="planBody"><span>② 招呼方案</span><span>▾</span></button>
    <div class="card-b" id="planBody">
      <label>本批使用方案</label>
      <div class="plan-picker">
        <select id="greetingPlanSelect"></select>
        <button class="icon-btn" id="newPlan" type="button">新建</button>
        <button class="icon-btn danger" id="deletePlan" type="button">删除</button>
      </div>
      <label>方案名称</label>
      <input type="text" id="planName" placeholder="AI 产品经理｜网站 + Agent + 简历">

      <label class="toggle-label"><input type="checkbox" id="aiOpeningEnabled" checked> 发送 AI 个性化开场</label>
      <textarea id="aiInstruction" rows="4" placeholder="描述开场的重点、长度和风格"></textarea>

      <label class="toggle-label"><input type="checkbox" id="fixedMessageEnabled" checked> 发送固定补充消息</label>
      <textarea id="fixedMessage" rows="4" placeholder="填写个人网站、个人 Agent 等固定内容"></textarea>

      <label class="toggle-label"><input type="checkbox" id="resumeImageEnabled" checked> 最后发送简历图片</label>
      <input type="file" id="planResumeImage" accept="image/*">
      <div id="planImgPrev" class="image-preview"></div>

      <div class="send-order">
        <strong>固定发送顺序</strong>
        <span>AI 开场</span><i>→</i><span>固定消息</span><i>→</i><span>简历图片</span>
      </div>
      <button class="btn-primary" id="savePlan">保存招呼方案</button>
      <span id="planSaved" class="ok-msg hidden">✓ 已保存</span>
    </div>
  </section>

  <section class="card">
    <div class="card-title"><span>③ 收集与 AI 筛选</span></div>
    <div class="card-b">
      <div class="safety-note">会读取完整 JD 并筛选，不会点击“立即沟通”。</div>
      <button class="btn-go" id="btnCollect">开始收集 + AI 筛选</button>
      <div class="status-row"><span id="phaseText">未开始</span><span id="progText"></span></div>
      <div class="ctrl">
        <button id="btnPause" disabled>暂停</button>
        <button id="btnStop" disabled>停止</button>
        <button id="btnReset">重置批次</button>
      </div>
    </div>
  </section>

  <section class="card" id="reviewCard">
    <div class="card-title"><span>④ 岗位审核</span><span id="reviewCount">0 个岗位</span></div>
    <div class="review-tabs" id="reviewTabs">
      <button data-review-tab="pending_review" class="active">推荐 <span>0</span></button>
      <button data-review-tab="needs_info">待补充 <span>0</span></button>
      <button data-review-tab="approved">已批准 <span>0</span></button>
      <button data-review-tab="rejected">不投递 <span>0</span></button>
      <button data-review-tab="filtered_out">已排除 <span>0</span></button>
    </div>
    <div class="card-b review-body">
      <div id="reviewList"><div class="empty">还没有筛选结果</div></div>
      <div class="sticky-action">
        <span id="approvedSummary">已批准 0 个</span>
        <button class="btn-go compact" id="btnPreview" disabled>预演已批准岗位</button>
      </div>
    </div>
  </section>

  <section class="card" id="previewCard">
    <div class="card-title"><span>⑤ 投递预演</span><span id="previewSummary">0 个已确认</span></div>
    <div class="card-b">
      <div class="safety-note">预演只生成最终内容；确认后才可进入正式投递。</div>
      <div id="previewRunError" class="preview-run-error hidden" role="alert" aria-live="assertive"></div>
      <div id="previewList"><div class="empty">批准岗位后点击“预演已批准岗位”</div></div>
      <button class="btn-live" id="btnDeliver" disabled>暂无可正式投递岗位</button>
      <div id="deliverDisabledReason" class="disabled-reason">需要先批准岗位并确认预演</div>
      <div id="batchCompletion" class="batch-completion hidden" role="status" aria-live="polite">
        <strong id="batchCompletionTitle">本批投递已结束</strong>
        <div id="batchCompletionSummary" class="batch-summary">成功 0 · 失败 0 · 未执行 0</div>
        <div class="batch-actions">
          <button type="button" class="btn-secondary" id="btnContinueBatch">处理剩余岗位</button>
          <button type="button" class="btn-go compact" id="btnNextBatch">开始下一批</button>
          <button type="button" class="btn-secondary" id="btnViewTracker">查看岗位进度</button>
        </div>
      </div>
    </div>
  </section>

  <section class="card" id="trackerCard">
    <button class="card-h" type="button" data-toggle="trackerBody"><span>⑥ 岗位进度</span><span id="trackerSummary">0 个岗位</span></button>
    <div class="card-b" id="trackerBody">
      <label>状态筛选</label>
      <select id="trackerFilter">
        <option value="all">全部状态</option>
        <option value="collected">已收集</option>
        <option value="contacted">已沟通</option>
        <option value="replied">已回复</option>
        <option value="interview">面试</option>
        <option value="rejected">淘汰</option>
        <option value="offer">Offer</option>
      </select>
      <div id="trackerList"></div>
    </div>
  </section>

  <details class="card log-card" id="logDetails">
    <summary><span>运行日志</span><button type="button" class="mini-btn" id="clearLog">清空</button></summary>
    <div class="log" id="log"></div>
  </details>

  <script src="llm-client.js"></script>
  <script src="job-filters.js"></script>
  <script src="job-detail.js"></script>
  <script src="greeting-plans.js"></script>
  <script src="review-workflow.js"></script>
  <script src="batch-lifecycle.js"></script>
  <script src="search-strategy.js"></script>
  <script src="match-scoring.js"></script>
  <script src="search-profiles.js"></script>
  <script src="preview-run-state.js"></script>
  <script src="job-tracker.js"></script>
  <script src="storage-utils.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
