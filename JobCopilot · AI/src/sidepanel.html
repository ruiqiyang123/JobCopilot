<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>BOSS自动投递</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="header"><h1>BOSS 自动投递</h1></div>

  <!-- 配置 -->
  <section class="card">
    <div class="card-h" data-toggle="cfgBody"><span>① 配置</span><span class="chev">▾</span></div>
    <div class="card-b" id="cfgBody">
      <label>AI 服务商</label>
      <select id="llmProvider">
        <option value="xiaomi">Xiaomi MiMo</option>
        <option value="deepseek">DeepSeek</option>
        <option value="longcat">LongCat</option>
        <option value="custom">自定义 OpenAI 兼容接口</option>
      </select>

      <label>API Key</label>
      <input type="password" id="llmApiKey" placeholder="在服务商控制台创建" autocomplete="off">

      <label>API 地址</label>
      <input type="text" id="llmBaseUrl" placeholder="https://api.example.com/v1">

      <label>模型名称</label>
      <input type="text" id="llmModel" placeholder="如：mimo-v2.5">

      <div id="llmAuthRow" style="display:none">
        <label>鉴权方式</label>
        <select id="llmAuthType">
          <option value="bearer">Authorization: Bearer</option>
          <option value="api-key">api-key 请求头</option>
        </select>
      </div>

      <div class="llm-actions">
        <button type="button" class="btn-secondary" id="testLlm">测试连接</button>
        <span id="llmTestStatus" class="test-status" aria-live="polite"></span>
      </div>

      <label>简历图片（投递时发给HR）</label>
      <input type="file" id="resumeImg" accept="image/*">
      <div id="imgPrev"></div>

      <label>简历文字（必填，用于AI筛选 + 生成招呼语）</label>
      <textarea id="resumeText" rows="5" placeholder="粘贴你的简历：技能、项目经历、教育背景、实习经历等，越详细招呼语越精准"></textarea>

      <label>岗位关键词</label>
      <input type="text" id="keyword" placeholder="如：数据分析 / AI应用">

      <label>城市</label>
      <input type="text" id="city" placeholder="如：沈阳 / 北京">

      <label>收集岗位数量</label>
      <input type="number" id="count" value="20" min="1" max="200">

      <div class="filter-group">
        <label class="filter-toggle"><input type="checkbox" id="experienceFilterEnabled" checked> 启用工作经验筛选</label>
        <div class="filter-options" id="experienceFilterOptions"></div>
      </div>

      <div class="filter-group">
        <label class="filter-toggle"><input type="checkbox" id="companySizeFilterEnabled" checked> 启用公司规模筛选</label>
        <div class="filter-options" id="companySizeFilterOptions"></div>
      </div>

      <button class="btn-primary" id="saveCfg">保存配置</button>
      <span id="saved" class="ok-msg" style="display:none">✓ 已保存</span>
    </div>
  </section>

  <!-- 运行 -->
  <section class="card">
    <div class="card-h"><span>② 运行</span></div>
    <div class="card-b">
      <label>运行模式</label>
      <select id="runMode">
        <option value="preview" selected>模拟运行（不沟通、不发送）</option>
        <option value="live">正式投递（仅限预演成功岗位）</option>
      </select>
      <div class="run-mode-hint" id="runModeHint">默认安全模式：读取完整 JD、二次校验并生成招呼语，不会建立沟通。</div>
      <button class="btn-go" id="btnCollect">开始收集 + AI筛选</button>
      <div class="status-row">
        <span id="phaseText">未开始</span>
        <span id="progText"></span>
      </div>
      <div class="ctrl">
        <button id="btnPause" disabled>暂停</button>
        <button id="btnStop" disabled>停止</button>
        <button id="btnReset">重置</button>
      </div>
    </div>
  </section>

  <!-- 审核 -->
  <section class="card" id="reviewCard" style="display:none">
    <div class="card-h"><span>③ 审核确认</span><span id="reviewCount"></span></div>
    <div class="card-b">
      <div class="review-tools">
        <label class="mini"><input type="checkbox" id="selAll" checked> 全选匹配</label>
        <button class="btn-go" id="btnDeliver">预演选中岗位</button>
      </div>
      <div id="reviewList"></div>
    </div>
  </section>

  <!-- 进度管理 -->
  <section class="card" id="trackerCard">
    <div class="card-h"><span>④ 岗位进度</span><span id="trackerSummary">0 个岗位</span></div>
    <div class="card-b">
      <label>状态筛选</label>
      <select id="trackerFilter">
        <option value="all">全部状态</option>
        <option value="collected">已收集</option>
        <option value="contacted">已沟通</option>
        <option value="replied">已回复</option>
        <option value="interview">面试</option>
        <option value="rejected">淘汰</option>
        <option value="offer">Offer</option>
      </select>
      <div id="trackerList"></div>
    </div>
  </section>

  <!-- 日志 -->
  <section class="card">
    <div class="card-h"><span>日志</span><button class="mini-btn" id="clearLog">清空</button></div>
    <div class="log" id="log"></div>
  </section>

  <script src="llm-client.js"></script>
  <script src="job-filters.js"></script>
  <script src="job-tracker.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
